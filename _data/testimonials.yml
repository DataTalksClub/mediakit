- author: Adrian Brudaru
  role: dltHub
  url: https://www.linkedin.com/in/data-team
  quote: |
    Collaborating with DataTalks.Club for the Data Engineering Zoomcamp on data ingestion went way better than we thought. We didn't just hit our target audience; we attracted a mix of beginners and experts from diverse backgrounds.

    The workshop got over 10,000 views on YouTube. Plus, the participants really put the word out, doing a lot of the marketing legwork for us. Just last week, we were featured in two podcasts, and the number of people trying out dlt doubled. Our Slack community also saw a 25% increase in a month, largely thanks to the workshop.

    We will continue working with DataTalks.Club. They're focused on providing value to the professionals and sponsors alike. This workshop wasn't just another content we did - it changed the game regarding dlt's exposure to our data audience. Besides addressing the professionals who took the course, DTC put dlt on the radars of other SaaS vendors who started integrating dlt into their products.

    The real win for us wasn't just the numbers. The workshop enabled us to get our tool in the hands of various types of professionals, giving us invaluable feedback.

- author: Kevin Kho
  role: ex-Prefect, now Figue
  url: https://www.linkedin.com/in/kvnkho/
  quote: |
    At Prefect, we sponsored multiple conferences such as PyCon and KubeCon. At startup price, you pay $10k-$15k USD to have a booth for 2-3 days. We got around 200-300 people stop by the booth, a lot of which are existing users. We maybe got 4-5 real new users.

    Compare this to MLOps Zoomcamp where we had around 300-400 homework submissions. There are also a lot of people who just watch the courses without doing the homework. Some of these people are in brand name institutions too. I've seen people from Micron, IBM, Accenture taking the course to name a few.

    Beyond MLOps Zoomcamp, the DataTalks.Club Slack channel is very big on democratizing high quality information to people trying to break into industry. The Slack is very welcoming and people really help each other. They also support open source technologies with the Open Source Spotlight and the Podcast. Sponsoring the initiative feels more like it goes to a good cause in comparison to conferences.

- author: Tim Liu
  role: BentoML
  url: https://www.linkedin.com/in/timliu9/
  quote: |
    We sponsored Module 7 of Machine Learning Zoomcamp, which covers production-ready machine learning using BentoML. Over 165 students attempted the homework, and many used BentoML in their midterm and final projects. Some units in the module had over 1,000 views, and we also noticed a lot of positive social media posts about BentoML.

    Compared to other sponsorship opportunities we evaluated, ML Zoomcamp aligned more with BentoML's developer-focused approach. It's been great to provide value to the open-source community and support developers in serving their models at scale.

    Overall, we're satisfied with our decision to support ML Zoomcamp and DataTalks.Club and we're grateful for the opportunity to help so many students learn and use BentoML.

