courses:
  - title: Mention
    price: "€5,000"
    extra_price: "&nbsp;"
    description: "Get your brand featured in one of our popular Zoomcamp courses, followed by thousands of learners worldwide."
    features:
      - Logo placement on course page
      - Mention in course launch stream
      - Encouragement for students to try your product
      - "Optional demo video (up to 10 min, open-source only)"
      - Shout-out from the official Telegram channel
    metrics:
      - { value: "5K-10K", label: views }
    image: course-mention.png
    example_url: https://github.com/DataTalksClub/machine-learning-zoomcamp/blob/e787517e9c9555fc873d1be262193bfaecc0d9d2/08-deep-learning/01b-saturn-cloud.md
    example_label: See it in the course
  - title: Workshop
    price: "€10,000"
    extra_price: "+€5,000 if recorded by Alexey"
    description: "A hands-on workshop inside a course module, teaching students to apply concepts using your product."
    features:
      - Logo placement on course page
      - Mention in course launch stream
      - Live-streamed workshop, part of the course curriculum
      - "Dedicated homework assignment (3 questions)"
      - Optional raffle/giveaway for participants
    metrics:
      - { value: "5K-10K", label: views }
    image: course-workshop.png
    popular: true
    example_url: https://github.com/DataTalksClub/data-engineering-zoomcamp/blob/main/cohorts/2024/workshops/dlt.md
    example_label: See the dlt workshop
  - title: Full Module
    price: "€20,000"
    extra_price: "+€5,000 if recorded by Alexey"
    description: "Our deepest integration: your tool is used to teach a full module topic that students use throughout."
    features:
      - Logo + mention in the launch stream
      - "Full module (5-10 lessons) featuring your tool"
      - "Homework assignment (6-7 questions) based on your product"
      - Office hours with the course participants
      - Evergreen visibility on GitHub and YouTube
      - For open-source tools only
    metrics:
      - { value: "10K-50K", label: total views }
    image: course-module.png
    example_url: https://github.com/DataTalksClub/data-engineering-zoomcamp/tree/main/cohorts/2024/02-workflow-orchestration
    example_label: See the module

