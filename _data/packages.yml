workshop:
  title: Stand-Alone Workshop
  price: "€5,000"
  extra_price: "+€5,000 if recorded by Alexey"
  description: "Live, hands-on code-along sessions led by your speaker and streamed on our YouTube channel. The fastest way to demonstrate your tool in action."
  features:
