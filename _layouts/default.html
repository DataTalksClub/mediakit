<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta name="author" content="{{ site.author }}" />
    <meta name="keywords" content="{{ site.keywords }}" />

    <meta property="og:title" content="{{ page.title | default: site.title }}" />
    <meta property="og:description" content="{{ page.description | default: site.description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="{{ site.og_image }}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="{{ site.twitter }}" />
    <meta name="twitter:image" content="{{ site.og_image }}" />

    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml" />
    <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}" sizes="any" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ["class"],
        theme: {
          container: { center: true, padding: "2rem", screens: { "2xl": "1400px" } },
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
              secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
              destructive: { DEFAULT: "hsl(var(--destructive))", foreground: "hsl(var(--destructive-foreground))" },
              muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
              accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
              popover: { DEFAULT: "hsl(var(--popover))", foreground: "hsl(var(--popover-foreground))" },
              card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
              "brand-blue": "hsl(var(--brand-blue))",
              "brand-blue-dark": "hsl(var(--brand-blue-dark))",
              "brand-blue-light": "hsl(var(--brand-blue-light))",
              "brand-navy": "hsl(var(--brand-navy))",
              "brand-slate": "hsl(var(--brand-slate))",
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
              xl: "calc(var(--radius) + 4px)",
              "2xl": "calc(var(--radius) + 8px)",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        :root {
          --background: 210 20% 98%;
          --foreground: 222 47% 11%;
          --card: 0 0% 100%;
          --card-foreground: 222 47% 11%;
          --popover: 0 0% 100%;
          --popover-foreground: 222 47% 11%;
          --primary: 222 47% 11%;
          --primary-foreground: 210 40% 98%;
          --secondary: 210 20% 96%;
          --secondary-foreground: 222 47% 11%;
          --muted: 210 20% 94%;
          --muted-foreground: 215 16% 47%;
          --accent: 215 70% 45%;
          --accent-foreground: 0 0% 100%;
          --destructive: 0 84% 60%;
          --destructive-foreground: 210 40% 98%;
          --border: 214 32% 91%;
          --input: 214 32% 91%;
          --ring: 215 70% 45%;
          --radius: 0.75rem;
          --brand-blue: 215 70% 45%;
          --brand-blue-dark: 220 60% 35%;
          --brand-blue-light: 215 70% 92%;
          --brand-navy: 222 47% 11%;
          --brand-slate: 215 25% 27%;
          --shadow-sm: 0 1px 3px 0 hsl(222 47% 11% / 0.05), 0 1px 2px -1px hsl(222 47% 11% / 0.05);
          --shadow-lg: 0 10px 15px -3px hsl(222 47% 11% / 0.08), 0 4px 6px -4px hsl(222 47% 11% / 0.04);
          --shadow-card: 0 1px 3px hsl(222 47% 11% / 0.04), 0 1px 2px hsl(222 47% 11% / 0.06);
          --shadow-card-hover: 0 10px 40px -10px hsl(215 70% 45% / 0.15), 0 4px 6px -2px hsl(222 47% 11% / 0.05);
        }

        * {
          @apply border-border;
        }

        body {
          font-family: "Inter", sans-serif;
          font-size: 16px;
        }

        h1, h2, h3, h4, h5, h6 {
          font-family: "Space Grotesk", sans-serif;
        }
      }

      @layer components {
        .section-container {
          @apply max-w-6xl mx-auto px-4 sm:px-6 lg:px-8;
        }

        .premium-card {
          @apply bg-card rounded-2xl border border-border relative overflow-hidden;
          box-shadow: var(--shadow-card);
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card::before {
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          background: linear-gradient(135deg, hsl(215 70% 45% / 0.02), transparent);
          opacity: 0;
          transition: opacity 0.3s ease;
        }
        .premium-card:hover {
          border-color: hsl(var(--brand-blue) / 0.3);
          box-shadow: var(--shadow-card-hover);
        }
        .premium-card:hover::before {
          opacity: 1;
        }

        .price-badge {
          @apply inline-flex items-center px-4 py-2 rounded-xl font-bold text-lg;
          background: hsl(var(--brand-blue));
          color: white;
          box-shadow: 0 2px 8px hsl(215 70% 45% / 0.3);
        }

        .metric-pill {
          @apply inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-sm;
          background: hsl(var(--brand-blue) / 0.08);
          color: hsl(var(--brand-blue));
          font-weight: 600;
        }

        .feature-item {
          @apply flex items-start gap-3 text-sm text-muted-foreground py-1.5;
        }
        .feature-item::before {
          content: "";
          @apply w-1.5 h-1.5 rounded-full bg-brand-blue mt-2 flex-shrink-0;
        }

        .glass {
          background: hsl(var(--card) / 0.8);
          backdrop-filter: blur(8px);
          -webkit-backdrop-filter: blur(8px);
        }

        .stat-card {
          @apply bg-card rounded-2xl p-6 border border-border transition-all duration-300 relative overflow-hidden;
          box-shadow: var(--shadow-sm);
        }

        .btn-primary {
          @apply inline-flex items-center justify-center px-6 py-3 text-sm font-semibold rounded-xl text-white transition-all duration-300;
          background: hsl(var(--brand-blue));
          box-shadow: 0 2px 8px hsl(215 70% 45% / 0.25);
        }
        .btn-primary:hover {
          transform: translateY(-1px);
          box-shadow: 0 4px 12px hsl(215 70% 45% / 0.35);
        }

        .tag {
          @apply inline-flex items-center px-3 py-1 rounded-full text-xs font-medium;
          background: hsl(var(--brand-blue) / 0.1);
          color: hsl(var(--brand-blue));
        }

        .tag-outline {
          @apply inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border;
          border-color: hsl(var(--brand-blue) / 0.3);
          color: hsl(var(--brand-blue));
        }
      }
    </style>
  </head>

  <body class="min-h-screen bg-background text-foreground antialiased">
    {% include header.html %}
    <main>
      {{ content }}
    </main>
    {% include footer.html %}

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-[60] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 hidden">
      <button type="button" id="lightbox-close" aria-label="Close"
        class="absolute top-6 right-6 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
        <i data-lucide="x" class="w-6 h-6 text-white"></i>
      </button>
      <img id="lightbox-img" src="" alt="" class="max-w-full max-h-[90vh] rounded-xl shadow-2xl" />
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  </body>
</html>
